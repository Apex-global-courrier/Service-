<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ATLAS EXPRESS SERVICE | Track Your Shipment</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
body{font-family:Inter,sans-serif;background:radial-gradient(circle at top left,#ff5b5b,#c1121f,#8b0000);color:#fff;min-height:100vh}
.logo-font{font-family:'Playfair Display',serif}
.tracking-card{background:#fff;backdrop-filter:blur(20px);box-shadow:0 30px 60px rgba(0,0,0,.35)}
#trackBtn{background:#c1121f;transition:.3s}#trackBtn:hover{background:#990000}
#result{background:rgba(135,206,235,.18);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.3)}
#preloader{position:fixed;inset:0;background:#c1121f;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:opacity .8s}
.spin{width:80px;height:80px;border:8px solid rgba(255,255,255,.3);border-top:8px solid #fff;border-radius:50%;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
#site{display:none}
</style></head>
<body>
<div id="preloader"><div class="spin"></div><h2 class="text-3xl mt-6 font-bold text-white">ATLAS EXPRESS SERVICE</h2></div>
<div id="site">
<div class="max-w-5xl mx-auto pt-8 px-6 flex items-center justify-between">
<div class="flex items-center gap-3"><div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-red-700 font-bold text-3xl">A</div><div><span class="logo-font text-3xl font-bold">ATLAS EXPRESS</span><span class="block text-sky-300 tracking-[4px] text-sm">SERVICE</span></div></div>
<div class="bg-red-800 px-6 py-3 rounded-3xl"><i class="fas fa-globe text-sky-300"></i> <span id="liveDate"></span></div></div>
<div class="max-w-2xl mx-auto mt-12 px-6">
<div class="tracking-card rounded-3xl p-10 text-[#0A2A66]">
<div class="flex justify-between"><div><span class="text-red-700 text-sm tracking-widest">ATLAS EXPRESS SERVICE</span><h1 class="text-5xl font-bold">Shipment<br>Tracker</h1></div><i class="fas fa-truck-fast text-6xl text-red-700"></i></div>
<form id="trackingForm" class="space-y-8 mt-8"><input id="trackingId" type="text" placeholder="AES-9876543210" class="w-full bg-zinc-100 rounded-2xl px-7 py-6 text-xl"><button id="trackBtn" class="w-full text-white py-6 rounded-2xl mt-4">TRACK SHIPMENT</button></form></div>
<div id="result" class="hidden mt-8 rounded-3xl p-8 text-white">Tracking ID: <span id="resultId"></span></div></div>
<footer class="text-center text-white/70 text-xs mt-16 pb-8">©2026 ATLAS EXPRESS SERVICE</footer>
</div>
<script>
liveDate.textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
setTimeout(()=>{preloader.style.opacity='0';setTimeout(()=>{preloader.style.display='none';site.style.display='block';},800)},5000);
trackingForm.addEventListener('submit',e=>{e.preventDefault();let v=trackingId.value.trim();if(!v)return alert('Please enter your tracking ID');trackBtn.disabled=true;trackBtn.innerHTML='Loading...';setTimeout(()=>{resultId.textContent=v;result.classList.remove('hidden');trackBtn.disabled=false;trackBtn.innerHTML='TRACK ANOTHER SHIPMENT';},1200);});
</script></body></html>
